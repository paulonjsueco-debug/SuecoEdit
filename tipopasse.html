<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TipoPasse | Studio Real-Time</title>
    <link rel="icon" href="favico.png" type="image/png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.9);
            --accent: #2563eb;
            --text: #0f172a;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.2s; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Compacto */
        header { 
            padding: 10px 20px; 
            background: var(--surface); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }

        /* Logo como Favicon */
        .app-logo {
            height: 40px;
            width: auto;
            display: block;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        /* Sidebar com Scroll Independente */
        .sidebar {
            width: 320px;
            padding: 15px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        .sidebar::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* Área de Visualização (Preview) Flexível */
        .preview-workspace {
            flex: 1;
            background: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Editor Master (Tamanho Fixo Proporcional 47.921x63.5) */
        .editor-frame {
            width: 144px; /* 47.921 * 3 para visualização compacta */
            height: 190.5px; /* 63.5 * 3 */
            margin: 0 auto;
            border: 2px solid var(--accent);
            border-radius: 8px;
            background: #000;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        /* Card de Controles */
        .control-card {
            background: var(--bg);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .label-text { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Upload Button */
        .upload-btn {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            position: relative;
            background: var(--bg);
        }
        .upload-btn:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .upload-btn input { position: absolute; opacity: 0; inset: 0; cursor: pointer; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; padding-top: 10px; }
        .btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 13px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-save { background: var(--accent); }
        .btn-pdf { background: #10b981; }

        /* Responsividade Mobile */
        @media (max-width: 850px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            body { overflow-y: auto; }
            .sidebar { width: 100%; overflow: visible; border-right: none; border-bottom: 1px solid var(--border); }
            .preview-workspace { min-height: 400px; padding: 10px; }
        }
    </style>
</head>
<body data-theme="dark">

<header>
    <img src="favicon.png" alt="SuecoEdit - TipoPasse" class="app-logo" onerror="this.style.display='none';">
    <button onclick="toggleTheme()" style="background: none; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 600;">Trocar Tema</button>
</header>

<div class="main-container">
    <aside class="sidebar">
        <div class="upload-btn">
            <span style="font-size: 12px; font-weight: 700; color: var(--text);">➕ Carregar Imagem</span>
            <input type="file" id="upload" accept="image/*">
        </div>

        <div class="control-card">
            <span class="label-text">Enquadramento Master</span>
            <div class="editor-frame">
                <canvas id="cropCanvas"></canvas>
            </div>
            <p style="font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 5px;">Arraste a foto acima para ajustar</p>
        </div>

        <div class="control-card">
            <span class="label-text">Ajustes Finos</span>
            <div style="margin-bottom: 10px;">
                <label style="font-size: 11px; display: flex; justify-content: space-between;">Zoom da Foto <span id="zoom-val" style="color:var(--accent)">100%</span></label>
                <input type="range" id="zoom-slider" min="0.1" max="2" step="0.001" value="0.5">
            </div>
            <div style="margin-bottom: 10px;">
                <label style="font-size: 11px;">Brilho</label>
                <input type="range" id="brightness" min="-0.4" max="0.4" step="0.01" value="0">
            </div>
            <div>
                <label style="font-size: 11px;">Saturação</label>
                <input type="range" id="saturation" min="-0.6" max="0.6" step="0.01" value="0">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-save" onclick="exportJPG()">SALVAR JPG</button>
            <button class="btn btn-pdf" onclick="exportPDF()">GERAR PDF</button>
        </div>
    </aside>

    <main class="preview-workspace">
        <div style="box-shadow: 0 20px 50px rgba(0,0,0,0.3); background: #fff; border: 1px solid #ccc;">
            <canvas id="a5Canvas"></canvas>
        </div>
    </main>
</div>

<script>
    const { jsPDF } = window.jspdf;
    const MM_TO_PX = 11.811; // 300 DPI

    // Medidas Exatas Solicitadas
    const T_W_MM = 47.921;
    const T_H_MM = 63.5;
    const PHOTO_W_PX = T_W_MM * MM_TO_PX;
    const PHOTO_H_PX = T_H_MM * MM_TO_PX;
    const A5_W_PX = 210 * MM_TO_PX;
    const A5_H_PX = 148 * MM_TO_PX;

    // Editor Master (Escalado para a UI 3:1)
    const uiFactor = 3;
    const cropCanvas = new fabric.Canvas('cropCanvas', {
        width: T_W_MM * uiFactor,
        height: T_H_MM * uiFactor,
        backgroundColor: '#000',
        selection: false,
        stopContextMenu: true
    });

    // Canvas da Prancheta A5
    const a5Canvas = new fabric.Canvas('a5Canvas', {
        width: A5_W_PX,
        height: A5_H_PX,
        backgroundColor: '#ffffff',
        selection: false,
        renderOnAddRemove: false // Alta performance
    });

    // Ajuste dinâmico da visualização do papel A5
    function adjustView() {
        const workspace = document.querySelector('.preview-workspace');
        const availableW = workspace.offsetWidth - 40;
        const availableH = workspace.offsetHeight - 40;
        const zoom = Math.min(availableW / A5_W_PX, availableH / A5_H_PX);
        
        a5Canvas.setZoom(zoom);
        a5Canvas.setWidth(A5_W_PX * zoom);
        a5Canvas.setHeight(A5_H_PX * zoom);
    }
    window.addEventListener('resize', adjustView);
    adjustView();

    let masterImg = null;

    // Carregamento de Imagem
    document.getElementById('upload').addEventListener('change', function(e) {
        if(!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                cropCanvas.clear();
                // Ajuste inicial preenchendo a caixa (Aspect Fill)
                const scale = Math.max(cropCanvas.width / img.width, cropCanvas.height / img.height);
                img.set({
                    left: cropCanvas.width/2, top: cropCanvas.height/2,
                    originX: 'center', originY: 'center',
                    scaleX: scale, scaleY: scale,
                    hasControls: false, hasBorders: false,
                    selectable: true, evented: true // Permite arrastar
                });
                cropCanvas.add(img);
                masterImg = img;
                // Sincroniza o slider de zoom com a escala inicial
                document.getElementById('zoom-slider').value = scale;
                updateAppControls(); 
                renderGrid(); // Primeira renderização
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // --- SINCRONIZAÇÃO EM TEMPO REAL ---

    // 1. Monitora o ARRASTO da foto no editor
    cropCanvas.on('object:moving', renderGrid);

    // 2. Monitora o ZOOM (via sliders) ou outras alterações de escala
    cropCanvas.on('object:scaling', renderGrid);

    // Função que lê os controles e aplica na imagem master
    function updateAppControls() {
        if (!masterImg) return;
        const z = parseFloat(document.getElementById('zoom-slider').value);
        const b = parseFloat(document.getElementById('brightness').value);
        const s = parseFloat(document.getElementById('saturation').value);

        // Atualiza valor do zoom na UI
        document.getElementById('zoom-val').innerText = Math.round((z / (cropCanvas.width / masterImg.width * 0.5)) * 100) + "%";

        // Aplica transformações e filtros
        masterImg.set({ scaleX: z, scaleY: z });
        masterImg.setCoords(); // Importante para garantir o centro correto

        masterImg.filters = [];
        if(b !== 0) masterImg.filters.push(new fabric.Image.filters.Brightness({ brightness: b }));
        if(s !== 0) masterImg.filters.push(new fabric.Image.filters.Saturation({ saturation: s }));
        
        masterImg.applyFilters();
        cropCanvas.requestRenderAll();
        renderGrid(); // Atualiza a visualização A5
    }

    // Vincula sliders à função de atualização
    document.getElementById('zoom-slider').oninput = updateAppControls;
    document.getElementById('brightness').oninput = updateAppControls;
    document.getElementById('saturation').oninput = updateAppControls;

    // --- RENDERIZAÇÃO DO GRID A5 ---

    function renderGrid() {
        if (!masterImg) return;

        // Exporta o editor master em alta definição (multiplicador para tamanho real 300DPI)
        const dataUrl = cropCanvas.toDataURL({ 
            format: 'jpeg', 
            quality: 1,
            multiplier: PHOTO_W_PX / cropCanvas.width 
        });

        fabric.Image.fromURL(dataUrl, (img) => {
            a5Canvas.clear().setBackgroundColor('#fff');
            
            const cols = 4, rows = 2;
            // Cálculo de espaçamento uniforme centralizado
            const marginX = (A5_W_PX - (cols * PHOTO_W_PX)) / (cols + 1);
            const marginY = (A5_H_PX - (rows * PHOTO_H_PX)) / (rows + 1);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    img.clone((cloned) => {
                        cloned.set({
                            left: marginX + (c * (PHOTO_W_PX + marginX)),
                            top: marginY + (r * (PHOTO_H_PX + marginY)),
                            selectable: false,
                            evented: false // Performance
                        });
                        a5Canvas.add(cloned);
                    });
                }
            }
            a5Canvas.requestRenderAll(); // Renderiza tudo de uma vez
        });
    }

    // --- FUNÇÕES AUXILIARES ---

    function toggleTheme() {
        const b = document.body;
        const current = b.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        b.setAttribute('data-theme', next);
        document.querySelector('.theme-switch').innerText = next === 'dark' ? 'Modo Light' : 'Modo Dark';
    }

    function exportJPG() {
        if(!masterImg) return;
        const d = a5Canvas.toDataURL({ format: 'jpeg', quality: 1, multiplier: 1/a5Canvas.getZoom() });
        const l = document.createElement('a'); l.download = 'TipoPasse_A5.jpg'; l.href = d; l.click();
    }

    function exportPDF() {
        if(!masterImg) return;
        const d = a5Canvas.toDataURL({ format: 'jpeg', quality: 1, multiplier: 1/a5Canvas.getZoom() });
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a5' });
        pdf.addImage(d, 'JPEG', 0, 0, 210, 148);
        pdf.save("TipoPasse_A5.pdf");
    }
</script>
</body>
</html>
